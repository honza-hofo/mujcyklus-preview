<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#F48FB1">
<title>MůjCyklus – Partner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --pink: #F48FB1;
  --pink-light: #FCE4EC;
  --pink-dark: #EC407A;
  --lavender: #E8DEF8;
  --lavender-light: #F3EEFA;
  --white: #FFFFFF;
  --bg: #FFFFFF;
  --card-bg: #FFFFFF;
  --dark: #333333;
  --dark-secondary: #555;
  --gray: #888;
  --gray-light: #F5F5F5;
  --border: #eee;
  --period: #E57373;
  --period-light: #FFCDD2;
  --fertile: #81C784;
  --fertile-light: #C8E6C9;
  --ovulation: #4CAF50;
  --pms: #FFB74D;
  --pms-light: #FFE0B2;
  --shadow: 0 2px 12px rgba(0,0,0,0.08);
  --radius: 16px;
  --radius-sm: 10px;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

[data-theme="dark"] {
  --bg: #1a1a2e;
  --card-bg: #16213e;
  --white: #1a1a2e;
  --dark: #e0e0e0;
  --dark-secondary: #bbb;
  --gray: #999;
  --gray-light: #1e2a4a;
  --border: #2a3a5a;
  --pink-light: #2a1a2e;
  --lavender-light: #1e1a3e;
  --period-light: #3a1a1a;
  --fertile-light: #1a3a1a;
  --pms-light: #3a2a1a;
  --shadow: 0 2px 12px rgba(0,0,0,0.3);
}

html, body {
  height: 100%;
  font-family: 'Nunito', -apple-system, sans-serif;
  background: var(--bg);
  color: var(--dark);
  -webkit-font-smoothing: antialiased;
  transition: background 0.3s, color 0.3s;
}

.container {
  max-width: 480px;
  margin: 0 auto;
  padding: 20px;
  padding-top: calc(env(safe-area-inset-top, 20px) + 12px);
  min-height: 100%;
  display: flex;
  flex-direction: column;
}

.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 24px;
}
.header h1 {
  font-size: 22px;
  font-weight: 800;
  color: var(--pink);
}
.dark-toggle {
  width: 44px; height: 44px;
  border: none;
  background: var(--gray-light);
  border-radius: 50%;
  font-size: 20px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
}

.card {
  background: var(--card-bg);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 20px;
  margin-bottom: 16px;
  transition: background 0.3s;
}

/* Phase display */
.phase-hero {
  text-align: center;
  padding: 24px 0;
}
.phase-ring {
  position: relative;
  width: 140px;
  height: 140px;
  margin: 0 auto 16px;
}
.phase-ring svg { transform: rotate(-90deg); }
.phase-ring-center {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}
.phase-ring-day {
  font-size: 32px;
  font-weight: 800;
  color: var(--pink);
}
.phase-ring-label {
  font-size: 11px;
  color: var(--gray);
  font-weight: 600;
}
.phase-name {
  font-size: 20px;
  font-weight: 700;
  margin-bottom: 4px;
}
.phase-sub {
  font-size: 14px;
  color: var(--gray);
}

.info-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 14px 0;
  border-bottom: 1px solid var(--border);
}
.info-row:last-child { border: none; }
.info-label {
  font-size: 14px;
  color: var(--gray);
  display: flex;
  align-items: center;
  gap: 8px;
}
.info-value {
  font-size: 15px;
  font-weight: 700;
}

.tip-card {
  background: linear-gradient(135deg, var(--pink-light), var(--lavender-light));
  border-radius: var(--radius);
  padding: 20px;
  margin-bottom: 16px;
  text-align: center;
}
[data-theme="dark"] .tip-card {
  background: linear-gradient(135deg, #2a1a2e, #1e1a3e);
}
.tip-card .tip-emoji { font-size: 32px; margin-bottom: 8px; }
.tip-card .tip-title { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
.tip-card .tip-text { font-size: 13px; color: var(--dark-secondary); line-height: 1.5; }

.mood-section {
  text-align: center;
  padding: 8px 0;
}
.mood-emojis {
  font-size: 28px;
  margin: 8px 0;
  letter-spacing: 4px;
}
.mood-label {
  font-size: 13px;
  color: var(--gray);
}

.no-data {
  text-align: center;
  padding: 40px 20px;
  color: var(--gray);
}
.no-data .icon { font-size: 48px; margin-bottom: 16px; }
.no-data p { font-size: 15px; line-height: 1.6; }

.footer {
  text-align: center;
  padding: 24px;
  margin-top: auto;
}
.footer .brand {
  font-size: 13px;
  color: var(--gray);
}
.footer .brand strong { color: var(--pink); }

.badge {
  display: inline-block;
  padding: 4px 12px;
  border-radius: 12px;
  font-size: 12px;
  font-weight: 700;
}

.confidence-badge {
  background: var(--lavender-light);
  color: var(--pink-dark);
  padding: 4px 10px;
  border-radius: 12px;
  font-size: 12px;
  font-weight: 700;
}

/* Calendar mini */
.mini-cal {
  display: flex;
  gap: 4px;
  justify-content: center;
  margin: 12px 0;
  flex-wrap: wrap;
}
.mini-cal-day {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  font-weight: 600;
  background: var(--gray-light);
}
.mini-cal-day.period { background: var(--period-light); color: var(--period); }
.mini-cal-day.fertile { background: var(--fertile-light); color: var(--fertile); }
.mini-cal-day.ovulation { background: var(--ovulation); color: white; }
.mini-cal-day.pms { background: var(--pms-light); color: var(--pms); }
.mini-cal-day.today { border: 2px solid var(--pink); }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>💑 MůjCyklus</h1>
    <button class="dark-toggle" onclick="toggleDark()" id="darkBtn">🌙</button>
  </div>

  <div id="content">
    <div class="no-data" id="noData" style="display:none">
      <div class="icon">🔒</div>
      <p>Žádná data nejsou k dispozici.<br>Partnerka musí nejprve sdílet svůj cyklus.</p>
    </div>
  </div>

  <div class="footer">
    <div class="brand">Powered by <strong>MůjCyklus</strong> v2.0</div>
  </div>
</div>

<script>
const SYMPTOMS = [
  { id: 'good_mood', emoji: '😊', label: 'Dobrá nálada' },
  { id: 'bad_mood', emoji: '😔', label: 'Špatná nálada' },
  { id: 'irritable', emoji: '😤', label: 'Podrážděnost' },
  { id: 'nausea', emoji: '🤢', label: 'Nevolnost' },
  { id: 'headache', emoji: '💆', label: 'Bolest hlavy' },
  { id: 'cramps', emoji: '🤰', label: 'Křeče' },
  { id: 'fatigue', emoji: '😴', label: 'Únava' },
  { id: 'breast_tenderness', emoji: '💧', label: 'Citlivost prsou' },
  { id: 'cravings', emoji: '🔥', label: 'Zvýšená chuť' },
  { id: 'libido', emoji: '💕', label: 'Zvýšené libido' },
  { id: 'insomnia', emoji: '💤', label: 'Nespavost' },
  { id: 'crying', emoji: '😢', label: 'Plačtivost' },
  { id: 'temperature', emoji: '🌡️', label: 'Teplota' },
  { id: 'pill_taken', emoji: '💊', label: 'Antikoncepce' }
];

const PHASE_CONFIG = {
  'Menstruace': { color: 'var(--period)', bg: 'var(--period-light)', emoji: '🔴', tip: 'Buď ohleduplný a trpělivý. Nabídni čaj, deku a pohodu.', tipEmoji: '🫶' },
  'Folikulární fáze': { color: 'var(--pink)', bg: 'var(--pink-light)', emoji: '🌸', tip: 'Energie roste! Skvělý čas na společné aktivity a výlety.', tipEmoji: '✨' },
  'Plodné dny': { color: 'var(--fertile)', bg: 'var(--fertile-light)', emoji: '🟢', tip: 'Plodné období. Ideální čas pro romantiku a blízkost.', tipEmoji: '💚' },
  'Ovulace': { color: 'var(--ovulation)', bg: 'var(--fertile-light)', emoji: '🟢', tip: 'Nejvíce plodný den! Nálada a energie na vrcholu.', tipEmoji: '💫' },
  'Luteální fáze': { color: 'var(--pink)', bg: 'var(--pink-light)', emoji: '🌸', tip: 'Klidnější období. Vhodné pro společné večery doma.', tipEmoji: '🏠' },
  'PMS': { color: 'var(--pms)', bg: 'var(--pms-light)', emoji: '🧡', tip: 'PMS období – buď zvlášť trpělivý a laskavý. Čokoláda funguje!', tipEmoji: '🍫' },
  'Neznámá': { color: 'var(--gray)', bg: 'var(--gray-light)', emoji: '❓', tip: '', tipEmoji: '' },
};

let darkMode = false;

function fmtDate(d) {
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

function parseDate(s) {
  const [y,m,d] = s.split('-').map(Number);
  return new Date(y, m-1, d);
}

function toggleDark() {
  darkMode = !darkMode;
  document.documentElement.setAttribute('data-theme', darkMode ? 'dark' : 'light');
  document.getElementById('darkBtn').textContent = darkMode ? '☀️' : '🌙';
  document.querySelector('meta[name="theme-color"]').content = darkMode ? '#1a1a2e' : '#F48FB1';
  localStorage.setItem('mujcyklus_partner_dark', darkMode ? '1' : '0');
}

// Get code from URL
const urlParams = new URLSearchParams(window.location.search);
let partnerCode = urlParams.get('code') || '';

async function loadPartnerData(code) {
  try {
    const resp = await fetch('/api/partner/view/' + code);
    if (!resp.ok) {
      document.getElementById('content').innerHTML = '<div class="no-data"><div class="icon">🔒</div><p>Neplatný kód<br><span style="color:var(--gray)">Zkontroluj kód a zkus to znovu.</span></p></div>';
      return;
    }
    const data = await resp.json();
    renderPartnerView(data);
  } catch(e) {
    document.getElementById('content').innerHTML = '<div class="no-data"><div class="icon">⚠️</div><p>Chyba spojení</p></div>';
  }
}

function renderPartnerView(data) {
  const content = document.getElementById('content');
  content.innerHTML = '';

  // Name header
  content.innerHTML += '<div class="card" style="text-align:center"><h2 style="font-size:18px;color:var(--pink)">' + (data.name || 'Partner') + '</h2><p style="font-size:13px;color:var(--gray)">sdílí s tebou svůj cyklus</p></div>';

  // Calculate cycle info from dayData and settings
  const cycleLength = data.settings?.cycleLength || 28;
  const periodLength = data.settings?.periodLength || 5;
  const lutealPhase = data.settings?.lutealPhase || 14;

  // Find last period start from dayData
  const periodDates = Object.keys(data.dayData || {}).filter(d => data.dayData[d].period).sort();
  let lastPeriodStart = null;
  let cycleDay = null;
  let phase = { name: 'Neznámá' };

  if (periodDates.length > 0) {
    // Find start of last period (first day after a gap)
    const sorted = periodDates.sort().reverse();
    lastPeriodStart = sorted[0];
    for (let i = 0; i < sorted.length - 1; i++) {
      const curr = parseDate(sorted[i]);
      const next = parseDate(sorted[i+1]);
      const diff = (curr - next) / (1000*60*60*24);
      if (diff > 1) { lastPeriodStart = sorted[i]; break; }
      lastPeriodStart = sorted[i+1];
    }

    const today = new Date(); today.setHours(0,0,0,0);
    const lpDate = parseDate(lastPeriodStart);
    cycleDay = Math.floor((today - lpDate) / (1000*60*60*24)) + 1;

    // Determine phase
    if (cycleDay <= periodLength) phase = { name: 'Menstruace' };
    else if (cycleDay > cycleLength - lutealPhase - 3 && cycleDay <= cycleLength - lutealPhase + 1) phase = { name: 'Plodné dny' };
    else if (cycleDay === cycleLength - lutealPhase + 1) phase = { name: 'Ovulace' };
    else if (cycleDay > cycleLength - 5) phase = { name: 'PMS' };
    else if (cycleDay <= cycleLength - lutealPhase - 3) phase = { name: 'Folikulární fáze' };
    else phase = { name: 'Luteální fáze' };
  }

  const phaseConf = PHASE_CONFIG[phase.name] || PHASE_CONFIG['Neznámá'];

  // Phase Hero
  const heroHtml = '<div class="card"><div class="phase-hero"><div class="phase-ring"><svg width="140" height="140"><circle cx="70" cy="70" r="60" fill="none" stroke="var(--gray-light)" stroke-width="8"/><circle id="partnerRing" cx="70" cy="70" r="60" fill="none" stroke="' + (phaseConf.color || 'var(--gray)') + '" stroke-width="8" stroke-linecap="round" stroke-dasharray="377" stroke-dashoffset="377"/></svg><div class="phase-ring-center"><div class="phase-ring-day">' + (cycleDay || '-') + '</div><div class="phase-ring-label">den cyklu</div></div></div><div class="phase-name">' + phaseConf.emoji + ' ' + phase.name + '</div><div class="phase-sub">Den ' + (cycleDay || '-') + ' z ~' + cycleLength + '</div></div></div>';
  content.innerHTML += heroHtml;

  // Animate ring
  setTimeout(function() {
    const ring = document.getElementById('partnerRing');
    if (ring && cycleDay) {
      const progress = Math.min(cycleDay / cycleLength, 1);
      ring.style.strokeDashoffset = 377 - (377 * progress);
      ring.style.stroke = phaseConf.color;
      ring.style.transition = 'stroke-dashoffset 1s ease-out';
    }
  }, 100);

  // Tip card
  if (phaseConf.tip) {
    content.innerHTML += '<div class="tip-card"><div class="tip-emoji">' + phaseConf.tipEmoji + '</div><div class="tip-title">Tip pro tebe</div><div class="tip-text">' + phaseConf.tip + '</div></div>';
  }

  // Period status
  if (data.showPeriod) {
    const isPeriod = phase.name === 'Menstruace';
    content.innerHTML += '<div class="card"><div class="info-row"><span class="info-label">🔴 Menstruace</span><span class="info-value" style="color:' + (isPeriod ? 'var(--period)' : 'var(--fertile)') + '">' + (isPeriod ? 'Probíhá' : 'Neprobíhá') + '</span></div></div>';
  }

  // Fertile window
  if (data.showFertile && lastPeriodStart) {
    const lpDate = parseDate(lastPeriodStart);
    const ovDay = cycleLength - lutealPhase;
    const fertileStartDay = ovDay - 5;
    const fertileEndDay = ovDay + 1;

    const fs = new Date(lpDate); fs.setDate(fs.getDate() + fertileStartDay - 1);
    const fe = new Date(lpDate); fe.setDate(fe.getDate() + fertileEndDay - 1);
    const ov = new Date(lpDate); ov.setDate(ov.getDate() + ovDay - 1);
    const today = new Date(); today.setHours(0,0,0,0);
    const isFertileNow = today >= fs && today <= fe;

    let fertileHtml = '<div class="card"><h3 style="font-size:16px;margin-bottom:12px">🟢 Plodné okno</h3>';
    fertileHtml += '<div class="info-row"><span class="info-label">Plodné dny</span><span class="info-value">' + fs.getDate() + '.' + (fs.getMonth()+1) + '. – ' + fe.getDate() + '.' + (fe.getMonth()+1) + '.</span></div>';
    fertileHtml += '<div class="info-row"><span class="info-label">Ovulace</span><span class="info-value">' + ov.getDate() + '.' + (ov.getMonth()+1) + '.</span></div>';

    if (isFertileNow) {
      fertileHtml += '<div style="text-align:center;padding:12px;margin-top:8px;background:var(--fertile-light);border-radius:var(--radius-sm)"><span style="font-size:16px;font-weight:700;color:var(--ovulation)">🟢 Právě probíhá plodné okno!</span></div>';
    }

    // Mini calendar
    fertileHtml += '<div class="mini-cal">';
    for (let i = -3; i <= 8; i++) {
      const d = new Date(fs); d.setDate(d.getDate() + i);
      const dStr = fmtDate(d);
      let cls = '';
      if (d.getTime() === ov.getTime()) cls = 'ovulation';
      else if (d >= fs && d <= fe) cls = 'fertile';
      if (fmtDate(today) === dStr) cls += ' today';
      fertileHtml += '<div class="mini-cal-day ' + cls + '">' + d.getDate() + '</div>';
    }
    fertileHtml += '</div></div>';
    content.innerHTML += fertileHtml;
  }

  // Moods
  if (data.showMoods && data.dayData) {
    const todayStr = fmtDate(new Date());
    const todayData = data.dayData[todayStr];
    if (todayData && todayData.mood) {
      content.innerHTML += '<div class="card"><h3 style="font-size:16px;margin-bottom:8px">💭 Nálada dnes</h3><div class="mood-section"><div class="mood-label">' + todayData.mood + '</div></div></div>';
    }
  }

  // Symptoms
  if (data.showSymptoms && data.dayData) {
    const todayStr = fmtDate(new Date());
    const todayData = data.dayData[todayStr];
    if (todayData && todayData.symptoms && todayData.symptoms.length > 0) {
      const symHtml = todayData.symptoms.map(function(s) {
        const sym = SYMPTOMS.find(function(x) { return x.id === s; });
        return sym ? '<span style="display:inline-block;padding:6px 12px;background:var(--gray-light);border-radius:20px;font-size:13px;margin:3px">' + sym.emoji + ' ' + sym.label + '</span>' : '';
      }).join('');
      content.innerHTML += '<div class="card"><h3 style="font-size:16px;margin-bottom:12px">🩺 Symptomy dnes</h3><div style="display:flex;flex-wrap:wrap;gap:4px">' + symHtml + '</div></div>';
    }
  }
}

function init() {
  // Dark mode
  darkMode = localStorage.getItem('mujcyklus_partner_dark') === '1';
  if (darkMode) {
    document.documentElement.setAttribute('data-theme', 'dark');
    document.getElementById('darkBtn').textContent = '☀️';
    document.querySelector('meta[name="theme-color"]').content = '#1a1a2e';
  }

  if (partnerCode) {
    loadPartnerData(partnerCode);
  } else {
    // Show code entry form
    document.getElementById('content').innerHTML = '<div class="card" style="text-align:center;padding:32px 20px">' +
      '<div style="font-size:48px;margin-bottom:16px">💑</div>' +
      '<h2 style="font-size:20px;margin-bottom:8px">Partnerský pohled</h2>' +
      '<p style="color:var(--gray);font-size:14px;margin-bottom:24px">Zadej kód, který ti poslal/a partner/ka</p>' +
      '<input type="text" id="codeInput" placeholder="ABC123" maxlength="6" style="width:100%;padding:14px;font-size:20px;text-align:center;letter-spacing:8px;border:2px solid var(--border);border-radius:var(--radius-sm);font-family:inherit;font-weight:700;text-transform:uppercase;background:var(--gray-light);color:var(--dark)">' +
      '<button onclick="submitCode()" style="width:100%;margin-top:16px;padding:14px;background:var(--pink);color:white;border:none;border-radius:var(--radius-sm);font-size:16px;font-weight:700;cursor:pointer;font-family:inherit">Zobrazit cyklus</button>' +
      '</div>';
  }
}

function submitCode() {
  const code = document.getElementById('codeInput').value.trim().toUpperCase();
  if (code.length >= 4) {
    partnerCode = code;
    window.history.replaceState(null, '', '?code=' + code);
    loadPartnerData(code);
  }
}

init();
</script>
</body>
</html>
